name: Noema CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-v1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Syntax check (v1 generator)
        run: node --check generate.js && node --check relay.js && node --check action-processor.js

      - name: Template integrity
        run: |
          grep -c 'data-tab=' archive/v4.html
          grep -c 'tab-content' archive/v4.html
          echo "Template integrity check passed"

      - name: Documentation quality
        run: |
          test -f README.md && echo "✅ README"
          test -f CONTRIBUTING.md && echo "✅ CONTRIBUTING"
          test -f architecture.md && echo "✅ architecture"
          test -f roadmap.md && echo "✅ roadmap"

  validate-v2:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
