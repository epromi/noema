name: Noema CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Secret scanning
        run: |
          chmod +x scripts/pre-commit.sh
          # Scan ALL tracked files (not just staged — full repo audit)
          RED='\033[0;31m'
          GREEN='\033[0;32m'
          NC='\033[0m'

          PATTERNS=(
            '[0-9]{8,10}:[A-Za-z0-9_-]{35}'             # Telegram Bot Token
            'sk-[a-zA-Z0-9_-]{20,}'                         # OpenAI API key
            'sk-or-v1-[a-zA-Z0-9-]+'                       # OpenRouter API key
            'ghp_[a-zA-Z0-9]{36}'                          # GitHub PAT (classic)
            'github_pat_[a-zA-Z0-9_]{20,}'                # GitHub PAT (fine-grained)
            'xox[baprs]-[a-zA-Z0-9-]{10,}'                # Slack tokens
            'AIza[0-9A-Za-z_-]{35}'                        # Google API key
            'AKIA[0-9A-Z]{16}'                             # AWS Access Key
            '-----BEGIN (RSA|EC|DSA|OPENSSH) PRIVATE KEY-----' # Private keys
          )

          FILES=$(git ls-files | grep -v -E 'node_modules|pnpm-lock|package-lock|.env.example|.svelte-kit|build|dist|coverage')
          FOUND=0

          for file in $FILES; do
            [ ! -f "$file" ] && continue
            for pattern in "${PATTERNS[@]}"; do
              if grep -Eq -- "$pattern" "$file" 2>/dev/null; then
                echo -e "${RED}🔴 SECRET in $file${NC}"
                grep -nE -- "$pattern" "$file" | head -3
                FOUND=1
              fi
            done
          done

          # Extra: .openclaw/ must never be tracked
          if git ls-files .openclaw/ 2>/dev/null | grep -q .; then
            echo -e "${RED}🔴 .openclaw/ files tracked — BLOCKED${NC}"
            git ls-files .openclaw/
            FOUND=1
          fi

          # Extra: .env files must never be tracked
          if git ls-files | grep -E '\.env$|\.env\.' | grep -v '.env.example' | grep -q .; then
            echo -e "${RED}🔴 .env files tracked — BLOCKED${NC}"
            git ls-files | grep -E '\.env$|\.env\.' | grep -v '.env.example'
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo -e "${RED}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${NC}"
            echo -e "${RED}  CI FAILED — Secrets detected in repository${NC}"
            echo -e "${RED}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${NC}"
            exit 1
          fi

          echo -e "${GREEN}✅ Secret scan passed ($(echo "$FILES" | wc -l) files)${NC}"

  validate-v1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Syntax check (v1 scripts)
        run: |
          node --check generate.cjs && echo "✅ generate.cjs"
          node --check relay.cjs && echo "✅ relay.cjs"
          node --check action-processor.cjs && echo "✅ action-processor.cjs"
          node --check scripts/spec-review-agent.cjs && echo "✅ spec-review-agent.cjs"
          node --check lib/cron-schedule.cjs && echo "✅ cron-schedule.cjs"
          echo "All syntax checks passed"

      - name: Template integrity
        run: |
          grep -c 'data-tab=' archive/v4.html
          grep -c 'tab-content' archive/v4.html
          echo "Template integrity check passed"

      - name: Documentation quality
        run: |
          test -f README.md && echo "✅ README"
          test -f CONTRIBUTING.md && echo "✅ CONTRIBUTING"
          test -f architecture.md && echo "✅ architecture"
          test -f roadmap.md && echo "✅ roadmap"

  validate-v2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if source code changed
        id: changes
        run: |\n          SKIP_DATA_ONLY='^(dashboard\.html|README\.md|CHANGELOG\.md|\.gitignore)$'
          if git diff --name-only HEAD~1 HEAD | grep -qvE "$SKIP_DATA_ONLY"; then
            echo "needs_build=true" >> $GITHUB_OUTPUT
          else
            echo "needs_build=false" >> $GITHUB_OUTPUT
            echo "⏭️  Only data/docs files changed — skipping SvelteKit pipeline"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.changes.outputs.needs_build == 'true'
        with:
          version: 11

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.needs_build == 'true'
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.changes.outputs.needs_build == 'true'
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        if: steps.changes.outputs.needs_build == 'true'
        run: pnpm check

      - name: Build
        if: steps.changes.outputs.needs_build == 'true'
        run: pnpm build

      - name: Test
        if: steps.changes.outputs.needs_build == 'true'
        run: pnpm test
